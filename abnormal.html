<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>異常事件紀錄與處理原則 · 麻豆新樓醫院藥劑科工作站</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="index.html"><span class="cross"></span>麻豆新樓醫院藥劑科工作站</a>
    <div class="header-actions">
      <a class="drug-quicklink" href="https://rt01.sinlau.org.tw/sinlau/pgm/slh-out-mq/" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        藥品查詢
      </a>
      <a class="drug-quicklink is-storage" href="storage.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7"/><path d="M12 11v10"/></svg>
        儲位查詢
      </a>
      <a class="drug-quicklink is-abnormal" href="abnormal.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.9 2.9 17a2 2 0 0 0 1.7 3h14.8a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>
        現場作業Q&A
      </a>
    </div>
  </div>
</header>

<main class="wrap">

  <section class="hero" style="padding-bottom:8px;">
    <span class="eyebrow">EVT-01 · INCIDENT LOG</span>
    <h1>異常事件紀錄與處理原則</h1>
    <p class="lede">發現異常事件時填寫紀錄，送出後會出現在下方清單，全院同仁都能查看，依時間新到舊排列。</p>
  </section>

  <div class="announce-actions">
    <a class="announce-add-btn" href="https://forms.gle/1y6JeE24DujgbmEYA" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      前往填寫
    </a>
    <button class="announce-refresh" id="refresh" type="button">重新整理</button>
  </div>

  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="q" type="text" placeholder="輸入關鍵字搜尋任何欄位內容…" autocomplete="off">
  </div>

  <div class="storage-actions">
    <span class="result-count" id="count"></span>
  </div>

  <p class="announce-error" id="error" style="display:none;"></p>
  <p class="empty-state" id="empty" style="display:none;">目前還沒有任何紀錄。</p>

  <div id="list"></div>

</main>

<footer>
  <div class="wrap">麻豆新樓醫院藥劑科工作站 · 紀錄內容僅供院內同仁參考</div>
</footer>

<script>
  window.LOG_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRG8Xost3i2u93DOYG6j3v3sCaPuaEI3GSo7uP0ZAuhkp7-R1q4ni7HdsIIrgfe2mNdHFochhegs7s6/pub?output=csv";
</script>
<script src="log.js"></script>
</body>
</html>
