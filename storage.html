    <nav class="topnav">
      <a href="index.html#forms">表單</a>

<main class="wrap" id="page-content" style="display:none;">

  <section class="hero" style="padding-bottom:8px;">
    <span class="eyebrow">LOC-01 · STORAGE LOOKUP</span>
    <h1>藥品儲位查詢</h1>
    <p class="lede">輸入藥品代碼、學名、商品名或中文名關鍵字，即可查詢住／急診與門診儲位。資料直接讀取 Google 試算表，同仁自行編輯表格即可更新，不需要改網站程式。</p>
  </section>

  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="q" type="text" placeholder="例如：EAIRFU、Alcohol、愛潔膚…" autocomplete="off">
  </div>

  <div class="storage-actions">
    <span class="result-count" id="count"></span>
    <button class="announce-refresh" id="refresh" type="button">重新整理</button>
  </div>

  <p class="announce-error" id="error" style="display:none;"></p>

  <div id="list"></div>

</main>

<footer>
